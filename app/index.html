<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An unofficial, free tool for browsing the WSDOT Standard Specifications (M 41-10), with 26 years of section history. Not affiliated with WSDOT."
    />
    <meta name="theme-color" content="#155c7a" />
    <!-- Favicon: an inline "§" (section sign) — no external request. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23155c7a'/%3E%3Ctext x='16' y='24' font-size='23' text-anchor='middle' fill='white' font-family='Georgia,serif'%3E%C2%A7%3C/text%3E%3C/svg%3E"
    />
    <!-- Social preview when the link is shared. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DOTcompass — WSDOT Standard Specifications, with history" />
    <meta
      property="og:description"
      content="Browse the WSDOT Standard Specifications and see 26 years of history for any section — what changed, when, and what was struck. Unofficial; verify against the published manual."
    />
    <meta name="twitter:card" content="summary" />
    <!--
      Set the theme before first paint so there is no flash of the wrong colors.
      Preference order: an explicit choice the user saved, otherwise the OS setting.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {
          /* private mode or storage disabled — fall back to the CSS default (light) */
        }
      })();
    </script>
    <title>WSDOT Standard Specifications — Explorer &amp; History</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
